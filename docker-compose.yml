services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama-cuda
    ports:
      - "11434:11434"
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
      OLLAMA_DEBUG: INFO
      OLLAMA_GPU_OVERHEAD: 1073741824
    volumes:
      - type: bind
        source: D:\ollama
        target: /root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
